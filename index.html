<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>るはなと折り紙</title>
    <meta name="description" content="るはなと折り紙の作品ギャラリー。折り紙作品の写真と制作記録を掲載しています。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <header class="site-header">
      <div class="fold-line" aria-hidden="true"></div>
      <div class="header-inner">
        <img
          class="luhanato-icon"
          src="images/luhanato.png"
          alt=""
        >
        <h1 class="site-title">るはなと折り紙</h1>
        <p class="self-introduction">折り紙の制作記録を掲載しています。
        <p class="self-introduction">2026年6月から始めた初心者です。</p>
      </div>
    </header>

    <section class="gallery" aria-label="作品一覧">
      <a
        href="https://x.com/luhanato15/status/2069010266294268070"
        target="_blank"
        rel="noopener noreferrer"
        class="card-link"
      >
        <article class="card">
          <div class="card-photo">
            <img src="images/artworks/20260622_kaeru.jpg" alt="ぴょんぴょんガエル" loading="lazy">
          </div>
          <div class="card-body">
            <h2 class="card-title">ぴょんぴょんガエル</h2>
            <p class="card-date">2026.06.22</p>
          </div>
        </article>
      </a>
      <a
        href="https://x.com/luhanato15/status/2068673666586755504"
        target="_blank"
        rel="noopener noreferrer"
        class="card-link"
      >
        <article class="card">
          <div class="card-photo">
            <img src="images/artworks/20260621_orizuru.JPG" alt="青い折り紙で折った鶴" loading="lazy">
          </div>
          <div class="card-body">
            <h2 class="card-title">折り鶴</h2>
            <p class="card-date">2026.06.21</p>
          </div>
        </article>
      </a>
    </section>

    <footer class="site-footer">
      <p>&copy; <span id="year"></span> るはなと</p>
    </footer>
  </body>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</html>
